<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body {
            background-color: #030408;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }
        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; }
        header { text-align: center; padding: 10px 0; border-bottom: 2px dashed rgba(0, 242, 254, 0.2); }
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900;
            background: linear-gradient(90deg, #00f2fe, #ff007f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-card {
            background: rgba(10, 12, 22, 0.85); border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 12px; padding: 12px; display: flex; flex-direction: column; align-items: center;
        }
        .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: #00f2fe; }
        
        .monitor-card { background: rgba(10, 12, 22, 0.9); border: 1px solid rgba(255, 0, 127, 0.15); border-radius: 14px; padding: 15px; }
        .monitor-title { font-family: 'Orbitron', sans-serif; font-size: 11px; color: #ff007f; margin-bottom: 12px; }
        .monitor-list { display: flex; flex-direction: column; gap: 10px; }
        .monitor-item { display: flex; flex-direction: column; gap: 4px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); padding-bottom: 8px; }
        .app-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; }
        .app-name { color: #f8fafc; }
        .app-details { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; }
        .detail-tag { background: rgba(255, 255, 255, 0.02); padding: 2px 6px; border-radius: 4px; }

        .control-section { display: flex; flex-direction: column; gap: 12px; }
        .btn-card {
            background: rgba(13, 16, 30, 0.9); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px; padding: 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer;
        }
        .btn-card:active { transform: scale(0.97); }
        .btn-title { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900; }
        .btn-desc { font-size: 11px; color: #64748b; }

        #toast {
            position: fixed; bottom: 20px; background: rgba(4, 5, 10, 0.95); border: 2px solid #00f2fe;
            color: #fff; padding: 10px 20px; border-radius: 20px; font-family: 'Orbitron', sans-serif;
            font-size: 11px; opacity: 0; transition: all 0.3s; z-index: 1000;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>⚡ APEX KERNEL CONTROLLER ⚡</h1>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Sıcaklık</span>
                <span class="stat-value" id="temp-val">--°C</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Ram Yükü</span>
                <span class="stat-value" id="ram-val">--%</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Frekans</span>
                <span class="stat-value" id="speed-val" style="color: #00ff66; font-size: 12px;">-- MHz</span>
            </div>
        </div>

        <div class="monitor-card">
            <div class="monitor-title">⚠️ EN ÇOK TÜKETEN UYGULAMALAR (CİHAZDAN)</div>
            <div class="monitor-list" id="resource-list">
                <div style="color: #64748b; text-align: center; font-size: 12px; padding: 10px;">Yükleniyor...</div>
            </div>
        </div>

        <div class="control-section">
            <div class="btn-card" onclick="runRoot('tam-hiz')" style="border-left: 5px solid #ff0055;">
                <div>
                    <div class="btn-title" style="color: #ff0055;">🚀 MAX PERFORMANCE</div>
                    <div class="btn-desc">İşlemciyi en yüksek hıza kilitler, gecikmeyi sıfırlar.</div>
                </div>
                <span>🔥</span>
            </div>

            <div class="btn-card" onclick="runRoot('ram')" style="border-left: 5px solid #00bfff;">
                <div>
                    <div class="btn-title" style="color: #00bfff;">🧹 RAM & CACHE FLUSH</div>
                    <div class="btn-desc">Arka plandaki sömürücüleri kazır, önbelleği temizler.</div>
                </div>
                <span>✨</span>
            </div>
        </div>
    </div>

    <div id="toast">BAĞLANTI OK</div>

    <script>
        function showToast(text, color = '#00f2fe') {
            const toast = document.getElementById('toast');
            toast.style.borderColor = color;
            toast.innerText = text;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        // Java'yı tetikleme
        function runRoot(action) {
            showToast("KOMUT GÖNDERİLİYOR...", "#00f2fe");
            if (window.AndroidBridge && window.AndroidBridge.performAction) {
                window.AndroidBridge.performAction(action);
            } else {
                showToast("Simülasyon Modu", "#ff0055");
            }
        }

        // Java başarıyla çalıştırdığında
        function onActionCompleted(action, msg) {
            showToast(msg, action === 'ram' ? '#00bfff' : '#ff0055');
        }

        // Cihaz Bilgilerini Güncelleme (Java her saniye tetikler)
        function updateMetrics(ram, temp, speed) {
            document.getElementById("ram-val").innerText = ram + "%";
            document.getElementById("temp-val").innerText = temp;
            document.getElementById("speed-val").innerText = speed;
        }

        // Cihazdaki Gerçek Uygulamaları Listeleme (Java her saniye tetikler)
        function updateRealApps(jsonString) {
            try {
                const realApps = JSON.parse(jsonString);
                const list = document.getElementById('resource-list');
                list.innerHTML = "";
                
                if (realApps.length === 0) {
                    list.innerHTML = `<div style="color:#64748b; text-align:center; font-size:12px; padding:10px;">Aktif çalışan taranıyor...</div>`;
                    return;
                }

                realApps.forEach(app => {
                    list.innerHTML += `
                        <div class="monitor-item">
                            <div class="app-header">
                                <span class="app-name">${app.name}</span>
                                <span style="color:#ff9f00; font-size:10px;">Aktif</span>
                            </div>
                            <div class="app-details">
                                <span class="detail-tag">RAM: ${app.ram}</span>
                                <span class="detail-tag">CPU: ${app.cpu}</span>
                                <span class="detail-tag" style="color:#ff007f;">PİL: ${app.battery}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error("Parse hatası", e);
            }
        }
    </script>
</body>
</html>
