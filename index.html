<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Performance Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #030408;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 15px;
            overflow-y: auto;
        }
        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 2;
        }
        header {
            text-align: center;
            padding: 10px 0;
            border-bottom: 2px dashed rgba(0, 242, 254, 0.2);
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #00f2fe, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat-card {
            background: rgba(10, 12, 22, 0.85);
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-label {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: bold;
        }
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #00f2fe;
        }

        /* 📊 CANLI KAYNAK SÖMÜRÜCÜLERİ PANELİ */
        .monitor-card {
            background: rgba(10, 12, 22, 0.9);
            border: 1px solid rgba(255, 0, 127, 0.15);
            border-radius: 14px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        .monitor-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #ff007f;
            margin-bottom: 10px;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.3);
            text-transform: uppercase;
        }
        .monitor-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .monitor-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding-bottom: 4px;
        }
        .app-name { color: #f8fafc; font-weight: bold; }
        .app-usage { font-family: 'Orbitron', sans-serif; }

        /* Butonlar */
        .control-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-card {
            background: rgba(13, 16, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-red::before { content: ''; position: absolute; left:0; top:0; width:5px; height:100%; background: #ff0055; }
        .btn-red { position: relative; overflow: hidden; }
        .btn-red:active { transform: scale(0.97); box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); }
        
        .btn-blue::before { content: ''; position: absolute; left:0; top:0; width:5px; height:100%; background: #00bfff; }
        .btn-blue { position: relative; overflow: hidden; }
        .btn-blue:active { transform: scale(0.97); box-shadow: 0 0 15px rgba(0, 191, 255, 0.4); }

        .btn-info { display: flex; flex-direction: column; gap: 2px; max-width: 80%; }
        .btn-title { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; }
        .btn-desc { font-size: 11px; color: #64748b; }

        #toast {
            position: fixed;
            bottom: 20px;
            background: rgba(4, 5, 10, 0.95);
            border: 2px solid #00f2fe;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.3s;
            z-index: 1000;
        }
        #toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>⚡ APEX KERNEL CONTROLLER ⚡</h1>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Sıcaklık</span>
                <span class="stat-value" id="cpu-temp">39°C</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Ram Yükü</span>
                <span class="stat-value" id="ram-usage">54%</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Ping (MS)</span>
                <span class="stat-value" id="ping-val" style="color: #00ff66;">4 ms</span>
            </div>
        </div>

        <div class="monitor-card">
            <div class="monitor-title">⚠️ EN ÇOK TÜKETEN UYGULAMALAR</div>
            <div class="monitor-list" id="resource-list">
                </div>
        </div>

        <div class="control-section">
            <div class="btn-card btn-red" onclick="runRoot('tam-hiz')">
                <div class="btn-info">
                    <span class="btn-title" style="color: #ff0055;">🚀 MAX PERFORMANCE</span>
                    <span class="btn-desc">İşlemciyi en yüksek hıza kilitler, gecikmeyi (ms) düşürür.</span>
                </div>
                <span>🔥</span>
            </div>

            <div class="btn-card btn-blue" onclick="runRoot('ram')">
                <div class="btn-info">
                    <span class="btn-title" style="color: #00bfff;">🧹 RAM & CACHE FLUSH</span>
                    <span class="btn-desc">Arka plandaki sömürücüleri kazır, hafızayı sıfırlar.</span>
                </div>
                <span>✨</span>
            </div>
        </div>
    </div>

    <div id="toast">BAĞLANTI OK</div>

    <script>
        function showToast(text, color = '#00f2fe') {
            const toast = document.getElementById('toast');
            toast.style.borderColor = color;
            toast.innerText = text;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        // HIZLI VE MS GECİKMESİZ JAVA TETİKLEME KÖPRÜSÜ
        function runRoot(action) {
            showToast("KOMUT GÖNDERİLİYOR...", "#00f2fe");
            if (window.AndroidBridge) {
                // Java'daki köprüyü anında tetikler (Milisaniyeler içinde!)
                window.AndroidBridge.performAction(action);
            } else {
                showToast("Simülasyon Aktif (Java Köprüsü Yok)", "#ff0055");
            }
        }

        // Java'dan tetiklenecek geri bildirim fonksiyonu
        function onActionCompleted(action, msg) {
            if (action === 'ram') {
                document.getElementById('ram-usage').innerText = "18%";
                showToast("TEMİZLENDİ: " + msg, "#00bfff");
                updateMonitorData(true); // Verileri sıfırla
            } else {
                showToast("PERFORMANS: " + msg, "#ff0055");
            }
        }

        // Canlı Kaynak Tüketim Verileri (Simüle edilen sömürücüler)
        const apps = [
            { name: "Instagram", ram: "1.2 GB", cpu: "%28", battery: "Yüksek" },
            { name: "TikTok", ram: "950 MB", cpu: "%34", battery: "Aşırı" },
            { name: "Google Play Servisleri", ram: "420 MB", cpu: "%12", battery: "Orta" },
            { name: "WhatsApp", ram: "310 MB", cpu: "%8", battery: "Düşük" },
            { name: "Sistem Arayüzü", ram: "550 MB", cpu: "%15", battery: "Orta" }
        ];

        function updateMonitorData(cleaned = false) {
            const list = document.getElementById('resource-list');
            list.innerHTML = "";
            if (cleaned) {
                list.innerHTML = `<div style="color:#00ff66; text-align:center; font-weight:bold;">✨ TÜM ARKA PLAN SİLİNDİ! SİSTEM AKICI.</div>`;
                return;
            }
            // Sömürenleri listele
            apps.forEach(app => {
                list.innerHTML += `
                    <div class="monitor-item">
                        <span class="app-name">${app.name}</span>
                        <span class="app-usage" style="color: #ff007f;">RAM: ${app.ram} | CPU: ${app.cpu} | Pil: ${app.battery}</span>
                    </div>
                `;
            });
        }

        // İlk yükleme ve döngüsel ısı takipleri
        updateMonitorData();
        setInterval(() => {
            document.getElementById('cpu-temp').innerText = (35 + Math.floor(Math.random() * 8)) + "°C";
        }, 3000);
    </script>
</body>
</html>
